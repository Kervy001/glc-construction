@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap');
:root{
  --ink:#1C2A38; --paper:#EFEAE0; --accent:#E8602C; --line:rgba(28,42,56,.12);
  --muted:rgba(28,42,56,.5); --white:#ffffff;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:'Inter',sans-serif;-webkit-tap-highlight-color:transparent;}
body{padding-bottom:env(safe-area-inset-bottom);}
.disp{font-family:'Oswald',sans-serif;letter-spacing:.02em;}
.mono{font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums;}
.tick{height:3px;opacity:.15;background-image:repeating-linear-gradient(90deg,var(--ink) 0 2px,transparent 2px 14px);}
a,button{font-family:inherit;}
button{cursor:pointer;border:none;background:none;color:inherit;}
input,select,textarea{font-family:inherit;color:inherit;}
input:focus,select:focus,textarea:focus{outline:2px solid var(--accent);outline-offset:1px;}
.wrap{max-width:480px;margin:0 auto;}
.field label{display:block;font-family:'IBM Plex Mono',monospace;font-size:9px;text-transform:uppercase;color:var(--muted);margin-bottom:3px;letter-spacing:.03em;}
.field input,.field select{width:100%;font-size:13px;background:var(--paper);border-radius:6px;padding:7px 8px;border:1px solid transparent;}
.card{background:var(--white);border:1px solid var(--line);border-radius:12px;padding:12px;box-shadow:0 1px 2px rgba(0,0,0,.04);}
.btn-primary{background:var(--ink);color:var(--paper);}
.btn-accent{background:var(--accent);color:#fff;}
.btn-ghost{background:rgba(28,42,56,.06);color:var(--ink);}
.btn{border-radius:10px;padding:10px 16px;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;display:inline-flex;align-items:center;gap:6px;}
.btn:disabled{opacity:.3;}
.chip{flex:0 0 auto;display:flex;align-items:center;gap:6px;padding:8px 12px;border-radius:999px;border:1px solid var(--line);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.03em;background:var(--white);white-space:nowrap;}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.chip.done{background:rgba(28,42,56,.06);}
.scrollx{display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.scrollx::-webkit-scrollbar{display:none;}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;z-index:40;}
.modal-sheet{background:var(--paper);width:100%;max-width:480px;margin:0 auto;border-radius:18px 18px 0 0;max-height:90vh;overflow-y:auto;padding:16px;}
.icon{width:16px;height:16px;display:inline-block;vertical-align:-3px;stroke:currentColor;stroke-width:2;fill:none;}
.badge-num{width:34px;height:34px;border-radius:8px;background:var(--ink);color:var(--accent);display:flex;align-items:center;justify-content:center;font-family:'Oswald';font-weight:700;font-size:13px;flex-shrink:0;}
.print-sheet{display:none;}
.hicon{padding:6px;background:rgba(255,255,255,.1);border-radius:8px;flex-shrink:0;}
textarea{width:100%;font-size:13px;background:var(--paper);border-radius:6px;padding:8px;border:1px solid var(--line);resize:vertical;}
@media print{
  .no-print{display:none !important;}
  #app{display:none !important;}
  .print-sheet{display:block !important;}
  body{background:#fff;}
}
</style>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import {
    getAuth, GoogleAuthProvider, signInWithPopup,
    createUserWithEmailAndPassword, signInWithEmailAndPassword,
    onAuthStateChanged, signOut, sendPasswordResetEmail
  } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
  import {
    getFirestore, doc, setDoc, getDoc, deleteDoc, collection, getDocs
  } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

  var firebaseConfig = {
    apiKey: "AIzaSyDn17ZUQot3Kqxleo7kC2ipa9pPHMV7GfQ",
    authDomain: "glc-construction-ht.firebaseapp.com",
    projectId: "glc-construction-ht",
    storageBucket: "glc-construction-ht.firebasestorage.app",
    messagingSenderId: "336302019579",
    appId: "1:336302019579:web:3083223f0ed4efb7c2b15e"
  };

  var fbApp = initializeApp(firebaseConfig);
  var auth = getAuth(fbApp);
  var db = getFirestore(fbApp);
  var googleProvider = new GoogleAuthProvider();

  function friendlyErr(e){
    var code = (e && e.code) || '';
    var map = {
      'auth/email-already-in-use': 'Yon kont deja egziste ak imèl sa a. Eseye konekte pito.',
      'auth/invalid-email': 'Fòma imèl la pa valab.',
      'auth/weak-password': 'Modpas la twò fèb — mete omwen 6 karaktè.',
      'auth/user-not-found': 'Pa gen kont ak imèl sa a.',
      'auth/wrong-password': 'Modpas la pa kòrèk.',
      'auth/invalid-credential': 'Imèl oswa modpas pa kòrèk.',
      'auth/popup-closed-by-user': 'Fenèt Google a fèmen anvan koneksyon fini.',
      'auth/network-request-failed': 'Pwoblèm koneksyon entènèt.'
    };
    return map[code] || (e && e.message) || 'Yon erè pase.';
  }

  window.FB = {
    ready: true,
    signUp: function(email, password){
      return createUserWithEmailAndPassword(auth, email, password)
        .then(function(cred){ return cred.user; })
        .catch(function(e){ throw new Error(friendlyErr(e)); });
    },
    signIn: function(email, password){
      return signInWithEmailAndPassword(auth, email, password)
        .then(function(cred){ return cred.user; })
        .catch(function(e){ throw new Error(friendlyErr(e)); });
    },
    signInGoogle: function(){
      return signInWithPopup(auth, googleProvider)
        .then(function(cred){ return cred.user; })
        .catch(function(e){ throw new Error(friendlyErr(e)); });
    },
    signOutUser: function(){ return signOut(auth); },
    resetPassword: function(email){
      return sendPasswordResetEmail(auth, email).catch(function(e){ throw new Error(friendlyErr(e)); });
    },
    saveMeta: function(uid, key, dataObj){ return setDoc(doc(db, 'users', uid, 'meta', key), dataObj); },
    loadMeta: function(uid, key){
      return getDoc(doc(db, 'users', uid, 'meta', key)).then(function(snap){ return snap.exists() ? snap.data() : null; });
    },
    saveProject: function(uid, id, dataObj){ return setDoc(doc(db, 'users', uid, 'projects', id), dataObj); },
    loadProject: function(uid, id){
      return getDoc(doc(db, 'users', uid, 'projects', id)).then(function(snap){ return snap.exists() ? snap.data() : null; });
    },
    deleteProject: function(uid, id){ return deleteDoc(doc(db, 'users', uid, 'projects', id)); },
    listProjects: function(uid){
      return getDocs(collection(db, 'users', uid, 'projects')).then(function(qs){
        var out = [];
        qs.forEach(function(d){ out.push(d.data()); });
        return out;
      });
    }
  };

  onAuthStateChanged(auth, function(user){
    window.dispatchEvent(new CustomEvent('fb-auth-changed', { detail: user ? { uid:user.uid, email:user.email } : null }));
  });
</script>

"use strict";

// ============================================================
// STORAGE COMPATIBILITY LAYER
// If window.storage already exists (running inside Claude), use it as-is.
// Otherwise (hosted standalone / real website / Play Store wrapper),
// fall back to a local IndexedDB-backed implementation with the same API.
// ============================================================
(function(){
  if(window.storage) return; // already provided by host environment (Claude)

  var DB_NAME = 'glc_construction_ht_db';
  var STORE = 'kv';
  var dbPromise = null;

  function openDB(){
    if(dbPromise) return dbPromise;
    dbPromise = new Promise(function(resolve, reject){
      if(!window.indexedDB){ reject(new Error('IndexedDB pa disponib nan navigatè sa a.')); return; }
      var req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = function(e){
        var db = e.target.result;
        if(!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE);
      };
      req.onsuccess = function(e){ resolve(e.target.result); };
      req.onerror = function(e){ reject(e.target.error || new Error('Erè IndexedDB')); };
    });
    return dbPromise;
  }

  window.storage = {
    get: function(key){
      return openDB().then(function(db){
        return new Promise(function(resolve, reject){
          var tx = db.transaction(STORE, 'readonly');
          var req = tx.objectStore(STORE).get(key);
          req.onsuccess = function(){
            if(req.result === undefined){ reject(new Error('Kle a pa egziste: '+key)); }
            else resolve({key:key, value:req.result, shared:false});
          };
          req.onerror = function(){ reject(req.error); };
        });
      });
    },
    set: function(key, value){
      return openDB().then(function(db){
        return new Promise(function(resolve, reject){
          var tx = db.transaction(STORE, 'readwrite');
          tx.objectStore(STORE).put(value, key);
          tx.oncomplete = function(){ resolve({key:key, value:value, shared:false}); };
          tx.onerror = function(){ reject(tx.error); };
        });
      });
    },
    delete: function(key){
      return openDB().then(function(db){
        return new Promise(function(resolve, reject){
          var tx = db.transaction(STORE, 'readwrite');
          tx.objectStore(STORE).delete(key);
          tx.oncomplete = function(){ resolve({key:key, deleted:true, shared:false}); };
          tx.onerror = function(){ reject(tx.error); };
        });
      });
    },
    list: function(prefix){
      return openDB().then(function(db){
        return new Promise(function(resolve, reject){
          var tx = db.transaction(STORE, 'readonly');
          var req = tx.objectStore(STORE).getAllKeys();
          req.onsuccess = function(){
            var keys = (req.result||[]).map(String).filter(function(k){ return !prefix || k.indexOf(prefix)===0; });
            resolve({keys:keys, prefix:prefix, shared:false});
          };
          req.onerror = function(){ reject(req.error); };
        });
      });
    }
  };
})();

// Called once when a user logs in: pulls cloud data down and merges with local.
async function fullCloudSync(){
  if(!cloudReady()) return;
  S.cloudStatus='ap senkwonize...'; render();
  try{
    var uid = S.user.uid;
    var localIndex = S.index || await loadIndex();

    // Merge company: cloud wins if it exists, else push local up
    var cloudCompany = await window.FB.loadMeta(uid, 'company');
    if(cloudCompany){ S.company = cloudCompany; S.lang = cloudCompany.lang||'ht'; await saveCompany(cloudCompany); }
    else if(S.company){ await saveCompany(S.company); await window.FB.saveMeta(uid, 'company', S.company); }

    // Merge notifs: combine, de-dupe by text+ts, cap 15, newest first
    var cloudNotifs = await window.FB.loadMeta(uid, 'notifs');
    var cloudNotifList = (cloudNotifs && cloudNotifs.list) || [];
    var localNotifList = S.notifs || await loadNotifs();
    var merged = cloudNotifList.concat(localNotifList);
    var seen = {}; var dedup = [];
    merged.sort(function(a,b){return b.ts-a.ts;});
    for(var i=0;i<merged.length;i++){
      var k = merged[i].text+'|'+merged[i].ts;
      if(!seen[k]){ seen[k]=true; dedup.push(merged[i]); }
    }
    dedup = dedup.slice(0,15);
    S.notifs = dedup;
    await saveNotifs(dedup);
    await window.FB.saveMeta(uid, 'notifs', {list:dedup});

    // Merge project index + data: newer updatedAt wins; anything missing on either side gets copied over
    var cloudProjects = await window.FB.listProjects(uid);
    var cloudById = {};
    cloudProjects.forEach(function(p){ cloudById[p.id]=p; });
    var localById = {};
    localIndex.forEach(function(e){ localById[e.id]=e; });

    var finalIndex = [];
    var allIds = {};
    localIndex.forEach(function(e){ allIds[e.id]=true; });
    cloudProjects.forEach(function(p){ allIds[p.id]=true; });

    for(var id in allIds){
      var localEntry = localById[id];
      var cloudProj = cloudById[id];
      if(cloudProj && (!localEntry || (cloudProj.updatedAt||0) >= (localEntry.updatedAt||0))){
        // cloud is newer or local doesn't have it: pull down
        await window.storage.set('devis:data:'+id, JSON.stringify(cloudProj));
        finalIndex.push({ id:cloudProj.id, projet:cloudProj.projet||cloudProj.kliyan||'Pwojè san non', kliyan:cloudProj.kliyan, devisNo:cloudProj.devisNo, updatedAt:cloudProj.updatedAt||Date.now(), totalHTG:cloudProj.totalHTG||0, statut:cloudProj.statut||'an_kou', typeProjet:cloudProj.typeProjet||'', dateDebi:cloudProj.dateDebi||'', dateFen:cloudProj.dateFen||'' });
      } else if(localEntry){
        // local is newer or cloud doesn't have it: push up
        finalIndex.push(localEntry);
        try{
          var r = await window.storage.get('devis:data:'+id);
          if(r){ await window.FB.saveProject(uid, id, JSON.parse(r.value)); }
        }catch(e){}
      }
    }
    await saveIndex(finalIndex);
    S.index = finalIndex;
    await window.FB.saveMeta(uid, 'index', {list:finalIndex});

    S.cloudStatus='senkwonize';
  }catch(e){
    S.cloudStatus='erè senkwonizasyon';
  }
  render();
}

function itemTotal(it){
  var pm = Number(it.pm)||0, pmo = Number(it.pmo)||0, q = Number(it.q)||0;
  if(it.priceMode==='fiks'){ return pm+pmo; }
  // Yon liy ak kantite 0 se yon egzanp/gid ki poko itilize — li pa dwe konte nan total la,
  // menm si li gen yon pri men-dèv ranpli kòm referans.
  if(q===0){ return 0; }
  // Materyo miltipliye pa kantite; Men-dèv se toujou yon montan ki adisyone apa, li pa miltipliye pa kantite.
  return (q*pm + pmo);
}
function totalsFor(phases){
  return phases.map(function(ph){
    return ph.items.reduce(function(s,it){ return s + itemTotal(it); }, 0);
  });
}
async function persist(proj){
  if(!proj) return;
  S.saving = true; updateSavingIndicator();
  try{
    await window.storage.set('devis:data:'+proj.id, JSON.stringify(proj));
    var phaseTotals = totalsFor(proj.phases);
    var sub = phaseTotals.reduce(function(a,b){return a+b;},0);
    var fin = sub * (1 + (Number(proj.majorasyon)||0)/100);
    var weighted = 0;
    proj.phases.forEach(function(ph,i){ weighted += (Number(ph.avansman)||0)*phaseTotals[i]; });
    var avansman = sub>0 ? Math.round(weighted/sub) : 0;
    var list = await loadIndex();
    var i = list.findIndex(function(p){ return p.id===proj.id; });
    var entry = { id:proj.id, projet: proj.projet || proj.kliyan || 'Pwojè san non', kliyan: proj.kliyan, devisNo: proj.devisNo, updatedAt: Date.now(), totalHTG: fin, statut: proj.statut||'an_kou', typeProjet: proj.typeProjet||'', dateDebi: proj.dateDebi||'', dateFen: proj.dateFen||'', avansman: avansman };
    if(i>=0) list[i]=entry; else list.unshift(entry);
    await saveIndex(list);
    S.index = list;
    pushProjectToCloud(proj);
    pushIndexToCloud();
  }catch(e){}
  S.saving = false; updateSavingIndicator();
}
function scheduleSave(){
  if(saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(function(){ persist(S.current); }, 700);

// Wrap render() so that typing in a field doesn't lose focus/cursor position
// every time a keystroke triggers a full re-render (needed because many
// calc fields have derived values elsewhere on screen that must update live).
(function(){
  var rawRender = render;
  render = function(){
    var active = document.activeElement;
    var fname = (active && active.name) ? active.name : null;
    var selStart = null, selEnd = null;
    if(fname && active && typeof active.selectionStart === 'number'){
      try{ selStart = active.selectionStart; selEnd = active.selectionEnd; }catch(e){}
    }
    rawRender();
    if(fname){
      var el = document.querySelector('[name="'+fname+'"]');
      if(el){
        el.focus();
        if(selStart!==null && el.setSelectionRange){
          try{ el.setSelectionRange(selStart, selEnd); }catch(e){}
        }
      }
    }
  };
})();

      (S.current.phases||[]).forEach(function(ph){ if(ph.avansman===undefined) ph.avansman=0; });

async function deleteProject(id){
  var entry = (S.index||[]).find(function(p){return p.id===id;});
  try{ await window.storage.delete('devis:data:'+id); }catch(e){}
  var list = (S.index||[]).filter(function(p){return p.id!==id;});
  await saveIndex(list);
  S.index = list;
  pushDeleteProjectToCloud(id);
  pushIndexToCloud();
  render();
  addNotif('Pwojè efase: '+(entry?entry.projet:'san non'));
}
async function duplicateProject(id){
  try{
    var r = await window.storage.get('devis:data:'+id);
    if(!r) return;
    var proj = JSON.parse(r.value);
    var now = new Date();
    proj.id = 'p'+Date.now()+Math.floor(Math.random()*1000);
    proj.devisNo = 'GLC-'+now.getFullYear()+'-'+String(Math.floor(Math.random()*900+100));
    proj.dat = now.toISOString().slice(0,10);
    proj.projet = (proj.projet||'Pwojè') + ' (kopi)';
    await persist(proj);
    S.current = proj; S.active=0; S.view='editor'; render();
    addNotif('Pwojè dupliye: '+proj.projet);
  }catch(e){}
}

// ---------------- backup / restore ----------------
async function exportBackup(){
  try{
    var list = await loadIndex();
    var data = { index:list, projects:{}, company: await loadCompany(), exportedAt: new Date().toISOString() };
    for(var i=0;i<list.length;i++){
      try{ var r = await window.storage.get('devis:data:'+list[i].id); if(r) data.projects[list[i].id]=JSON.parse(r.value); }catch(e){}
    }
    var blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = 'glc-construction-sovgad-'+new Date().toISOString().slice(0,10)+'.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(url);}, 2000);
    addNotif('Sovgad ekspòte ('+list.length+' pwojè)');
  }catch(e){ alertMsg('Erè pandan ekspòtasyon an.'); }
}
function importBackup(file){
  if(!file) return;
  var reader = new FileReader();
  reader.onload = async function(){
    try{
      var data = JSON.parse(reader.result);
      if(data.company) await saveCompany(data.company);
      var list = data.index || [];
      for(var id in (data.projects||{})){
        await window.storage.set('devis:data:'+id, JSON.stringify(data.projects[id]));
      }
      await saveIndex(list);
      S.index = list;
      render();
      alertMsg('Sovgad la enpòte avèk siksè.');
    }catch(e){ alertMsg('Fichye a pa valab.'); }
  };
  reader.readAsText(file);
}
function alertMsg(msg){
  var d = document.createElement('div');
  d.textContent = msg;
  d.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1C2A38;color:#EFEAE0;padding:10px 16px;border-radius:8px;font-size:12px;z-index:100;box-shadow:0 4px 12px rgba(0,0,0,.2);';
  document.body.appendChild(d);
  setTimeout(function(){ d.remove(); }, 3000);
}

function progressPanel(p, totals){
  var open = !!S.progressOpen;
  var sumCost = totals.reduce(function(a,b){return a+b;},0);
  var weighted = 0;
  p.phases.forEach(function(ph,i){ weighted += (Number(ph.avansman)||0)*totals[i]; });
  var overall = sumCost>0 ? Math.round(weighted/sumCost) : 0;

  var isLate = false, daysLate = 0;
  if(p.dateFen && overall<100){
    var end = new Date(p.dateFen+'T00:00:00');
    var today = new Date(); today.setHours(0,0,0,0);
    if(!isNaN(end.getTime()) && today>end){
      isLate = true;
      daysLate = Math.round((today-end)/(1000*60*60*24));
    }
  }

  var phaseRows = p.phases.map(function(ph,i){
    if(ph.items.length===0) return '';
    var av = Number(ph.avansman)||0;
    return '<div style="margin-top:10px;">'
      + '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;"><span>'+ph.n+'. '+esc(ph.label)+'</span><span class="mono" id="avansman-val-'+i+'" style="font-weight:600;">'+av+'%</span></div>'
      + '<div style="background:rgba(28,42,56,.08);border-radius:999px;height:6px;overflow:hidden;margin-bottom:6px;"><div id="avansman-bar-'+i+'" style="height:100%;width:'+av+'%;background:var(--accent);border-radius:999px;"></div></div>'
      + '<input type="range" min="0" max="100" step="5" value="'+av+'" oninput="updPhaseAvansman('+i+',this.value)" style="width:100%;">'
      + '</div>';
  }).join('');

  return '<div class="card" style="margin-top:12px;">'
    + '<div onclick="S.progressOpen=!S.progressOpen;render();" style="display:flex;justify-content:space-between;align-items:center;cursor:pointer;">'
      + '<span style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);">Swivi Chantye</span>'
      + '<span style="color:var(--muted);transform:rotate('+(open?'180':'0')+'deg);transition:transform .15s;">'+chevronIcon()+'</span>'
    + '</div>'
    + (!open ? '' : (
      '<div style="margin-top:12px;">'
      + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">'
        + '<span style="font-size:12px;font-weight:600;">Avansman Jeneral</span>'
        + '<span class="disp" id="overallProgressVal" style="font-size:18px;font-weight:700;color:var(--accent);">'+overall+'%</span>'
      + '</div>'
      + '<div style="background:rgba(28,42,56,.08);border-radius:999px;height:10px;overflow:hidden;">'
        + '<div id="overallProgressBar" style="height:100%;width:'+overall+'%;background:linear-gradient(90deg,var(--accent),#F0895C);border-radius:999px;transition:width .2s;"></div>'
      + '</div>'
      + (isLate ? '<p style="font-size:11px;color:#C0392B;margin:8px 0 0;font-weight:600;">⚠ An reta pa '+daysLate+' jou (dat fen prevwa: '+esc(p.dateFen)+')</p>' : '')
      + (phaseRows ? '<p class="mono" style="font-size:9px;text-transform:uppercase;color:var(--muted);margin:16px 0 0;border-top:1px solid var(--line);padding-top:10px;">Pa Faz</p>'+phaseRows : '<p style="font-size:12px;color:var(--muted);margin:12px 0 0;">Ajoute atik nan yon faz pou kòmanse swiv avansman li.</p>')
      + '</div>'
    ))
    + '</div>';
}

// ---------------- item / phase mutation ----------------
function updItem(id, field, value){
  var ph = S.current.phases[S.active];
  var it = ph.items.find(function(x){return x.id===id;});
  if(!it) return;
  it[field] = value;
  if(field==='q'||field==='pm'||field==='pmo'||field==='priceMode'){
    var totalEl = document.getElementById('total-'+id);
    if(totalEl) totalEl.textContent = fmt(itemTotal(it));
    recalcHeaderTotals();
  }
  scheduleSave();
}
function recalcHeaderTotals(){
  var totals = totalsFor(S.current.phases);
  var sub = totals.reduce(function(a,b){return a+b;},0);
  var majAmt = sub * ((Number(S.current.majorasyon)||0)/100);
  var finalHTG = sub + majAmt;
  var subEl = document.getElementById('phase-subtotal');
  if(subEl) subEl.textContent = fmt(totals[S.active])+' G';
  var footEl = document.getElementById('footer-total');
  if(footEl) footEl.innerHTML = fmt(finalHTG)+' <span style="font-size:12px;">HTG</span>';
}
function updPhaseAvansman(idx, value){
  var v = Math.max(0, Math.min(100, Number(value)||0));
  S.current.phases[idx].avansman = v;
  var valEl = document.getElementById('avansman-val-'+idx);
  if(valEl) valEl.textContent = v+'%';
  var barEl = document.getElementById('avansman-bar-'+idx);
  if(barEl) barEl.style.width = v+'%';
  var totals = totalsFor(S.current.phases);
  var sumCost = totals.reduce(function(a,b){return a+b;},0);
  var weighted = 0;
  S.current.phases.forEach(function(ph,i){ weighted += (Number(ph.avansman)||0)*totals[i]; });
  var overall = sumCost>0 ? Math.round(weighted/sumCost) : 0;
  var ovVal = document.getElementById('overallProgressVal');
  if(ovVal) ovVal.textContent = overall+'%';
  var ovBar = document.getElementById('overallProgressBar');
  if(ovBar) ovBar.style.width = overall+'%';
  scheduleSave();
}
function addItem(seed){
  var ph = S.current.phases[S.active];
  ph.items.push(Object.assign({id:nid(),d:'',u:'m²',q:0,pm:0,pmo:0,tip:'achte',priceMode:'inite'}, seed||{}));
  render(); scheduleSave();
}
function removeItem(id){
  var ph = S.current.phases[S.active];
  ph.items = ph.items.filter(function(x){return x.id!==id;});
  render(); scheduleSave();
}
function updPhaseLabel(v){ S.current.phases[S.active].label = v; scheduleSave(); }
function removePhase(){
  if(S.current.phases.length<=1) return;
  S.current.phases.splice(S.active,1);
  S.active = Math.max(0, S.active-1);
  render(); scheduleSave();
}
function toggleAddPhase(v){ S.showAddPhase = v; render(); }
function confirmAddPhase(){
  var input = document.getElementById('newPhaseName');
  var name = (input && input.value.trim()) || 'Nouvo Etap';
  var n = nextPhaseNum(S.current.phases);
  S.current.phases.push({key:'custom'+n, n:n, label:name, items:[], avansman:0});
  S.active = S.current.phases.length-1;
  S.showAddPhase = false;
  render(); scheduleSave();

    + '<span class="mono" style="font-size:13px;font-weight:600;">'+fmt(totals[i])+' G</span></div>';
  }).join('');

  var pctSum = p.tranches.reduce(function(a,t){return a+(Number(t.pct)||0);},0);
  var trancheRows = p.tranches.map(function(t,i){

      + '<input value="'+escAttr(t.label)+'" oninput="updTranche('+i+',\'label\',this.value)" style="flex:1;font-size:12px;background:var(--paper);border-radius:6px;padding:6px 8px;border:1px solid var(--line);">'

      + '<span class="mono" style="font-size:9px;color:var(--muted);">%</span>'
      + '<span class="mono" style="width:88px;text-align:right;font-size:12px;font-weight:600;">'+fmt(amt)+'</span>'
      + '<button onclick="removeTranche('+i+')" style="color:rgba(28,42,56,.3);padding:2px;">'+trashIcon()+'</button>'
      + '</div>';

  return '<div class="modal-backdrop no-print" onclick="if(event.target===this)toggleSummary(false)">'
  + '<div class="modal-sheet">'

  + (p.projet ? '<p style="font-size:13px;color:var(--muted);margin:4px 0 10px;">Pwojè: '+esc(p.projet)+(p.kliyan?' — '+esc(p.kliyan):'')+'</p>' : '<div style="height:6px;"></div>')
  + '<div class="tick" style="margin-bottom:10px;"></div>'
  + rows
  + '<div class="card" style="margin-top:12px;">'
    + rowLine('Sou-total (Materyo + Men-d\'èv)', fmt(sub)+' G')
    + '<div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:10px;"><label style="font-size:13px;color:var(--muted);flex:1;">Majorasyon (frè jesyon / pwofi %)</label><input type="number" name="proj_majorasyon" value="'+p.majorasyon+'" oninput="updProj(\'majorasyon\',this.value)" style="width:64px;font-size:13px;background:var(--paper);border-radius:6px;padding:5px 8px;text-align:right;"></div>'
    + rowLine('Montan majorasyon', fmt(majAmt)+' G')

  + '</div>'
  + '<div style="background:var(--ink);color:var(--paper);border-radius:12px;padding:14px 16px;margin-top:12px;">'
    + '<div style="display:flex;justify-content:space-between;align-items:center;"><span class="disp" style="font-size:13px;text-transform:uppercase;">Total Jeneral</span><span class="disp" style="font-size:20px;font-weight:700;color:var(--accent);">'+fmt(finalHTG)+' HTG</span></div>'
    + '<div style="display:flex;justify-content:space-between;margin-top:4px;opacity:.7;"><span class="mono" style="font-size:11px;">≈ Ekivalan USD</span><span class="mono" style="font-size:13px;">$'+fmt(finalUSD)+'</span></div>'
  + '</div>'
  + '<div class="card" style="margin-top:12px;">'

  + '</div></div>';

function tryPrint(){
  try{ window.print(); }
  catch(e){ alertMsg('Enprimant otomatik la pa disponib isit. Sèvi ak bouton "Telechaje PDF" pi ba a.'); }
}
function downloadDevisHTML(){
  try{
    var sheet = document.getElementById('printSheet');
    if(!sheet || !sheet.innerHTML){ alertMsg('Pa gen anyen pou telechaje.'); return; }
    var doc = '<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8">'
      + '<meta name="viewport" content="width=device-width, initial-scale=1">'
      + '<title>'+esc((S.current&&S.current.devisNo)||'Devis')+' — '+esc((S.company&&S.company.non)||'GLC Construction HT')+'</title>'
      + "<style>@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Inter:wght@400;500;600&display=swap');body{font-family:Inter,sans-serif;margin:0;background:#fff;}@media print{.print-btn{display:none;}}</style>"
      + '</head><body>'
      + '<div style="max-width:750px;margin:12px auto;text-align:right;" class="print-btn"><button onclick="window.print()" style="font-family:Inter,sans-serif;font-weight:600;background:#1C2A38;color:#EFEAE0;border:none;border-radius:8px;padding:10px 18px;font-size:13px;cursor:pointer;">Enprime / Sovgade kòm PDF</button></div>'
      + sheet.innerHTML
      + '</body></html>';
    var blob = new Blob([doc], {type:'text/html'});
    var url = URL.createObjectURL(blob);
    var win = window.open(url, '_blank');
    if(!win){
      var a = document.createElement('a');
      a.href = url; a.download = ((S.current&&S.current.devisNo)||'devis')+'.html';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      alertMsg('Fichye a telechaje. Louvri l epi peze "Enprime" pou fè PDF la.');
    }
    setTimeout(function(){URL.revokeObjectURL(url);}, 10000);
    addNotif('PDF jenere pou devis '+((S.current&&S.current.devisNo)||''));
  }catch(e){ alertMsg('Erè pandan jenerasyon fichye a.'); }
}
function rowLine(label, val){
  return '<div style="display:flex;justify-content:space-between;font-size:13px;"><span style="color:var(--muted);">'+esc(label)+'</span><span class="mono" style="font-weight:500;">'+val+'</span></div>';
}

function shareWhatsapp(){
  var p = S.current;
  var totals = totalsFor(p.phases);
  var sub = totals.reduce(function(a,b){return a+b;},0);
  var finalHTG = sub*(1+(Number(p.majorasyon)||0)/100);
  var text = ((S.company&&S.company.non)||'GLC CONSTRUCTION HT')+'\\nDevis N°: '+p.devisNo+'\\nPwojè: '+(p.projet||'-')+'\\nKliyan: '+(p.kliyan||'-')+'\\nDat: '+(p.dat||'-')+'\\n\\nTOTAL: '+fmt(finalHTG)+' HTG\\n\\nDevis valab '+(p.validite||30)+' jou.';
  window.open('https://wa.me/?text='+encodeURIComponent(text), '_blank');
}

function addBetonEntry(){
  var ct = findConcrete(calcState.betonType);
  var vol = Number(calcState.betonM3)||0;
  if(vol<=0) return;
  var pet2 = 1+(Number(calcState.betonPet)||0)/100;
  var sakKg = Number(calcState.sakKg)||45;
  var cimentKg = vol*ct.ciment*pet2;
  var entry = {
    label: ct.label, vol: vol,
    cimentKg: cimentKg, cimentSak: Math.ceil(cimentKg/sakKg),
    sab: vol*ct.sab*pet2, gravye: vol*ct.gravye*pet2, dlo: vol*ct.dloL*pet2
  };
  calcState.betonEntries.push(entry);
  calcState.betonM3 = '';
  render();
}
function removeBetonEntry(i){ calcState.betonEntries.splice(i,1); render(); }
function applyPoto(){
  var d=calcState.destPoto; S.active=d;
  var M_TO_FT = 3.28084;
  var pLajeM = (Number(calcState.potoLaje)||0)/100, pEpesM = (Number(calcState.potoEpes)||0)/100;
  var pWote = Number(calcState.potoWote)||0, pKantite = Number(calcState.potoKantite)||1;
  var vol = pLajeM*pEpesM*pWote*pKantite;
  var ct = findConcrete(calcState.potoBetonType);
  var pet = 1+(Number(calcState.potoBetonPet)||0)/100;
  var sakKg = Number(calcState.sakKg)||45;
  var cimentKg = vol*ct.ciment*pet;
  var cimentSak = Math.ceil(cimentKg/sakKg);
  var sab = vol*ct.sab*pet, gravye = vol*ct.gravye*pet, dlo = vol*ct.dloL*pet;
  var barKantite = Number(calcState.potoBarKantite)||4;
  var longèParBar = pWote + (Number(calcState.potoRecouvriman)||0);
  var pyeTotal = longèParBar*M_TO_FT*barKantite*pKantite;
  var barNeeded = Math.ceil(pyeTotal/(Number(calcState.barLonge)||20));
  var kouv = (Number(calcState.potoKouvèti)||2.5)/100;
  var perimèt = Math.max(0, 2*((pLajeM-2*kouv)+(pEpesM-2*kouv))) + 0.20;
  var qtyEtriye = (Math.ceil((pWote*100)/(Number(calcState.potoEtriyeEspasman)||15))+1)*pKantite;
  var pyeEtriye = (perimèt*qtyEtriye)*M_TO_FT;
  var etriyeBarNeeded = Math.ceil(pyeEtriye/(Number(calcState.barLonge)||20));

  S.current.phases[d].items.push({id:nid(), d:'Siman ('+sakKg+'kg/sak) — Poto', u:'sak', q:cimentSak, pm:0, pmo:0});
  S.current.phases[d].items.push({id:nid(), d:'Sab — Poto', u:'m³', q:Math.round(sab*100)/100, pm:0, pmo:0});
  S.current.phases[d].items.push({id:nid(), d:'Gravye — Poto', u:'m³', q:Math.round(gravye*100)/100, pm:0, pmo:0});
  S.current.phases[d].items.push({id:nid(), d:'Dlo — Poto', u:'litè', q:Math.round(dlo), pm:0, pmo:0});
  S.current.phases[d].items.push({id:nid(), d:'Fè Prensipal '+calcState.dyamet+' — Poto', u:'bar', q:barNeeded, pm:0, pmo:0});
  S.current.phases[d].items.push({id:nid(), d:'Fè Etriye '+calcState.dyamet+' — Poto', u:'bar', q:etriyeBarNeeded, pm:0, pmo:0});
  S.showCalc=false; render(); scheduleSave();
}
function applySemel(){
  var d=calcState.destSemel; S.active=d;
  var M_TO_FT = 3.28084;
  var sLonge = Number(calcState.semelLonge)||0, sLaje = Number(calcState.semelLaje)||0;
  var sEpes = Number(calcState.semelEpes)||0, sKantite = Number(calcState.semelKantite)||1;
  var vol = sLonge*sLaje*sEpes*sKantite;
  var ct = findConcrete(calcState.semelBetonType);
  var pet = 1+(Number(calcState.semelBetonPet)||0)/100;
  var sakKg = Number(calcState.sakKg)||45;
  var cimentKg = vol*ct.ciment*pet;
  var cimentSak = Math.ceil(cimentKg/sakKg);
  var sab = vol*ct.sab*pet, gravye = vol*ct.gravye*pet, dlo = vol*ct.dloL*pet;
  var kouv = (Number(calcState.semelKouvèti)||5)/100;
  var esp = Number(calcState.semelEspasman)||20;
  var n1 = Math.max(1, Math.ceil(((sLaje*100)-2*(kouv*100))/esp)+1);
  var n2 = Math.max(1, Math.ceil(((sLonge*100)-2*(kouv*100))/esp)+1);
  var longèTotal = (n1*sLonge + n2*sLaje)*sKantite;
  var pyeTotal = longèTotal*M_TO_FT;
  var barNeeded = Math.ceil(pyeTotal/(Number(calcState.barLonge)||20));

  S.current.phases[d].items.push({id:nid(), d:'Siman ('+sakKg+'kg/sak) — Semèl', u:'sak', q:cimentSak, pm:0, pmo:0});
  S.current.phases[d].items.push({id:nid(), d:'Sab — Semèl', u:'m³', q:Math.round(sab*100)/100, pm:0, pmo:0});
  S.current.phases[d].items.push({id:nid(), d:'Gravye — Semèl', u:'m³', q:Math.round(gravye*100)/100, pm:0, pmo:0});
  S.current.phases[d].items.push({id:nid(), d:'Dlo — Semèl', u:'litè', q:Math.round(dlo), pm:0, pmo:0});
  S.current.phases[d].items.push({id:nid(), d:'Fè Kadriyaj '+calcState.dyamet+' — Semèl', u:'bar', q:barNeeded, pm:0, pmo:0});
  S.showCalc=false; render(); scheduleSave();
}
function applyBetonTotal(){
  var d=calcState.destBeton; S.active=d;
  var t = calcState.betonEntries.reduce(function(a,e){ a.sak+=e.cimentSak; a.sab+=e.sab; a.gravye+=e.gravye; a.dlo+=e.dlo; return a; }, {sak:0,sab:0,gravye:0,dlo:0});
  S.current.phases[d].items.push({id:nid(), d:'Siman ('+(Number(calcState.sakKg)||45)+'kg/sak)', u:'sak', q:t.sak, pm:0, pmo:0});
  S.current.phases[d].items.push({id:nid(), d:'Sab', u:'m³', q:Math.round(t.sab*100)/100, pm:0, pmo:0});
  S.current.phases[d].items.push({id:nid(), d:'Gravye', u:'m³', q:Math.round(t.gravye*100)/100, pm:0, pmo:0});
  S.current.phases[d].items.push({id:nid(), d:'Dlo', u:'litè', q:Math.round(t.dlo), pm:0, pmo:0});
  calcState.betonEntries = [];
  S.showCalc=false; render(); scheduleSave();
}
function applyTol(qty){
  var d=calcState.destTol; S.active=d;
  var label = 'Tòl ('+calcState.tolLongePye+' pye) — kalkile';
  S.current.phases[d].items.push({id:nid(), d:label, u:'fèy', q:qty, pm:600, pmo:150});
  S.showCalc=false; render(); scheduleSave();
}
function applyBtu(unit){
  var d=calcState.destBtu; S.active=d;
  S.current.phases[d].items.push({id:nid(), d:'Klimatizè '+fmt(unit)+' BTU', u:'inite', q:1, pm:0, pmo:0});
  S.showCalc=false; render(); scheduleSave();
}
function applyPenti(galonFinal, galonSous){
  var d=calcState.destPenti; S.active=d;
  if(galonSous>0){ S.current.phases[d].items.push({id:nid(), d:'Penti sou-kouche / aprèt (galon)', u:'galon', q:galonSous, pm:900, pmo:150}); }
  S.current.phases[d].items.push({id:nid(), d:'Penti final (galon)', u:'galon', q:galonFinal, pm:1400, pmo:150});
  S.showCalc=false; render(); scheduleSave();
}
function applyElektrik(){
  var d=calcState.destElek; S.active=d;
  var elekPwen = Number(calcState.elekPwen)||0;
  var elekPriz = Number(calcState.elekPriz)||0;
  var totalPwen = elekPwen + elekPriz;
  var pet = 1+(Number(calcState.elekPet)||0)/100;
  var longeFil = totalPwen * (Number(calcState.elekLongeMwayen)||6) * pet;
  var sikwi = Math.max(1, Math.ceil(totalPwen/(Number(calcState.elekPwenPaSikwi)||8)));
  S.current.phases[d].items.push({id:nid(), d:'Pwen Limyè (enstale)', u:'pwen', q:elekPwen, pm:350, pmo:200});
  S.current.phases[d].items.push({id:nid(), d:'Priz Kouran (enstale)', u:'priz', q:elekPriz, pm:400, pmo:200});
  S.current.phases[d].items.push({id:nid(), d:'Fil elektrik (kalkile)', u:'ml', q:Math.round(longeFil), pm:60, pmo:0});
  S.current.phases[d].items.push({id:nid(), d:'Bwat deriviyon', u:'pyès', q:totalPwen, pm:150, pmo:50});
  S.current.phases[d].items.push({id:nid(), d:'Disjonktè / Sikwi', u:'pyès', q:sikwi, pm:1200, pmo:150});
  S.current.phases[d].items.push({id:nid(), d:'Tablo Prensipal', u:'forfè', q:1, pm:8000, pmo:2500});
  S.showCalc=false; render(); scheduleSave();
}

function aiModal(){
  var msgs = aiHistory.map(function(m){
    var bg = m.role==='user' ? 'var(--ink)' : 'var(--white)';

  }).join('');
  return '<div class="modal-backdrop no-print" onclick="if(event.target===this)toggleAI(false)">'
  + '<div class="modal-sheet" style="display:flex;flex-direction:column;">'
  + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;"><h3 class="disp" style="font-size:16px;font-weight:600;text-transform:uppercase;margin:0;">Asistan AI — Kalkil</h3><button onclick="toggleAI(false)">'+closeIcon()+'</button></div>'
  + '<p style="font-size:11px;color:var(--muted);margin:0 0 10px;">Mande AI pou ede w kalkile kantite materyo, konvèti inite, oswa esplike yon fòmil.</p>'
  + '<div id="aiMsgs" style="max-height:40vh;overflow-y:auto;margin-bottom:10px;">'+msgs+(aiLoading?'<div style="font-size:12px;color:var(--muted);">Ap kalkile...</div>':'')+'</div>'
  + '<div style="display:flex;gap:8px;">'
    + '<input id="aiInput" placeholder="Egz: Konbyen sak siman pou 5m³ dosaj 350?" style="flex:1;font-size:13px;background:var(--white);border:1px solid var(--line);border-radius:8px;padding:9px;" onkeydown="if(event.key===\'Enter\')askAI()">'
    + '<button class="btn btn-accent disp" onclick="askAI()">'+sendIcon()+'</button>'
  + '</div>'
  + '</div></div>';
}
async function askAI(){
  var input = document.getElementById('aiInput');
  var q = input && input.value.trim();
  if(!q || aiLoading) return;
  aiHistory.push({role:'user', text:q});
  aiLoading = true; render();
  try{
    var msgs = aiHistory.map(function(m){ return {role: m.role==='user'?'user':'assistant', content:m.text}; });
    var resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-6', max_tokens:1000,
        system:"Ou se yon asistan teknik pou GLC Construction HT, yon konpayi konstriksyon an Ayiti. Ede itilizatè a kalkile kantite materyo (blòk, siman, sab, gravye, fè, penti, elatriye), konvèti inite (lbs/kg, pye/mèt, m²/m³), ak esplike fòmil kout. Reponn an kreyòl ayisyen, kout e presi, montre kalkil la etap pa etap lè sa itil. Sèvi ak inite metrik ak konvansyon Ayisyen (sak siman 50kg, blòk 40x20cm).",
        messages: msgs
      })
    });
    var data = await resp.json();
    var text = (data.content||[]).map(function(b){return b.text||'';}).join('\n').trim() || 'Mwen pa t kapab jwenn yon repons.';
    aiHistory.push({role:'assistant', text:text});
  }catch(e){
    aiHistory.push({role:'assistant', text:'Erè: pa t kapab kontakte asistan AI la. Sa a ka rive si aplikasyon an ap fonksyone deyò Claude — fonksyon AI a bezwen yon koneksyon API espesyal ki disponib sèlman anndan Claude, sof si ou konekte l ak pwòp sèvè/kle API pa ou.'});
  }
  aiLoading = false;
  render();
  setTimeout(function(){ var box=document.getElementById('aiMsgs'); if(box) box.scrollTop=box.scrollHeight; var i2=document.getElementById('aiInput'); if(i2) i2.focus(); },50);
}

// ================= PRINT SHEET =================
function updatePrintSheet(){
  var el = document.getElementById('printSheet');
  if(!el || !S.current) { if(el) el.innerHTML=''; return; }
  var p = S.current;
  var totals = totalsFor(p.phases);
  var sub = totals.reduce(function(a,b){return a+b;},0);
  var majAmt = sub*((Number(p.majorasyon)||0)/100);
  var finalHTG = sub+majAmt;
  var finalUSD = finalHTG/(Number(p.tauxUSD)||1);
  var company = S.company || {tel:'',adres:'',kondisyon:DEFAULT_TERMS};

  var phaseBlocks = p.phases.map(function(ph,i){
    if(ph.items.length===0 || totals[i]===0) return '';
    var rows = ph.items.filter(function(it){return itemTotal(it)>0;}).map(function(it){
      var isFiks = it.priceMode==='fiks';
      var lineTotal = itemTotal(it);
      var pmoVal = Number(it.pmo)||0;
      var puDisplay = isFiks ? '<span style="font-style:italic;color:#888;">'+t('pv_fiks')+'</span>' : fmt(Number(it.pm)||0);
      var qDisplay = isFiks ? (Number(it.q)? fmt(it.q) : '—') : fmt(it.q);
      var tag = (it.tip==='lokasyon') ? ' <span style="color:#999;font-style:italic;font-size:9px;">('+t('pv_lokasyon')+')</span>' : '';
      var mdNote = (!isFiks && pmoVal>0) ? '<br><span style="font-size:9px;color:#888;">+ '+t('pv_menDev')+': '+fmt(pmoVal)+' G</span>' : '';
      return '<tr><td style="padding:4px 6px;border-bottom:1px solid #ddd;">'+esc(it.d)+tag+mdNote+'</td><td style="padding:4px 6px;border-bottom:1px solid #ddd;text-align:center;">'+esc(it.u)+'</td><td style="padding:4px 6px;border-bottom:1px solid #ddd;text-align:right;">'+qDisplay+'</td><td style="padding:4px 6px;border-bottom:1px solid #ddd;text-align:right;">'+puDisplay+'</td><td style="padding:4px 6px;border-bottom:1px solid #ddd;text-align:right;">'+fmt(lineTotal)+'</td></tr>';
    }).join('');
    if(!rows) return '';
    return '<h3 style="font-family:Oswald,sans-serif;font-size:13px;text-transform:uppercase;margin:16px 0 6px;">'+ph.n+'. '+esc(ph.label)+'</h3>'
    + '<table style="width:100%;border-collapse:collapse;font-size:11px;"><thead><tr style="background:#1C2A38;color:#fff;"><th style="padding:5px 6px;text-align:left;">'+t('pv_materyèl')+'</th><th style="padding:5px 6px;">'+t('pv_unite')+'</th><th style="padding:5px 6px;text-align:right;">'+t('pv_kantite')+'</th><th style="padding:5px 6px;text-align:right;">'+t('pv_priInite')+'</th><th style="padding:5px 6px;text-align:right;">'+t('pv_total')+'</th></tr></thead><tbody>'+rows+'</tbody></table>';
  }).join('');

  var trancheRows = (p.tranches||[]).map(function(tr){
    return '<div style="display:flex;justify-content:space-between;padding:3px 0;"><span>'+esc(tr.label)+' ('+esc(tr.pct)+'%)</span><span>'+fmt(finalHTG*(Number(tr.pct)||0)/100)+' HTG</span></div>';
  }).join('');

  el.innerHTML = '<div style="max-width:750px;margin:0 auto;padding:30px;font-family:Inter,sans-serif;color:#1C2A38;">'
  + '<div style="display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid #E8602C;padding-bottom:14px;">'
    + '<div><img src="'+(company.logo||('data:image/jpeg;base64,'+DEFAULT_LOGO_B64))+'" style="height:52px;display:block;"><p style="font-family:Oswald,sans-serif;font-size:14px;font-weight:700;text-transform:uppercase;margin:8px 0 0;">'+esc(company.non||'GLC Construction HT')+'</p><p style="font-size:11px;color:#666;margin:2px 0 0;">'+(company.slogan?esc(company.slogan):t('pv_taginKaye'))+(company.tel?(' — '+t('pv_telefon')+': '+esc(company.tel)):'')+(company.adres?(' — '+esc(company.adres)):'')+'</p></div>'
    + '<div style="text-align:right;font-size:11px;"><strong>'+t('pv_devisNo')+':</strong> '+esc(p.devisNo)+'<br><strong>'+t('pv_dat')+':</strong> '+esc(p.dat)+'<br><strong>'+t('pv_valab')+':</strong> '+esc(p.validite||30)+' '+t('pv_jou')+'</div>'
  + '</div>'
  + '<div style="display:flex;justify-content:space-between;margin-top:14px;font-size:12px;">'
    + '<div><strong>'+t('pv_pwoje')+':</strong> '+esc(p.projet||'—')+'<br><strong>'+t('pv_adresChantye')+':</strong> '+esc(p.adres||'—')+'</div>'
    + '<div style="text-align:right;"><strong>'+t('pv_kliyan')+':</strong> '+esc(p.kliyan||'—')+'<br><strong>'+t('pv_telefon')+':</strong> '+esc(p.telefon||'—')+'</div>'
  + '</div>'
  + phaseBlocks
  + '<div style="margin-top:20px;padding-top:12px;border-top:2px solid #1C2A38;font-size:12px;">'
    + '<div style="display:flex;justify-content:space-between;padding:3px 0;"><span>'+t('pv_soutotal')+'</span><span>'+fmt(sub)+' HTG</span></div>'
    + '<div style="display:flex;justify-content:space-between;padding:3px 0;"><span>'+t('pv_majorasyon')+' ('+esc(p.majorasyon)+'%)</span><span>'+fmt(majAmt)+' HTG</span></div>'
    + '<div style="display:flex;justify-content:space-between;padding:8px 0;margin-top:6px;border-top:1px solid #1C2A38;font-family:Oswald,sans-serif;font-size:16px;font-weight:700;"><span>'+t('pv_totalJeneral')+'</span><span style="color:#E8602C;">'+fmt(finalHTG)+' HTG</span></div>'
    + '<div style="display:flex;justify-content:flex-end;font-size:11px;color:#666;">≈ $'+fmt(finalUSD)+' USD (to '+esc(p.tauxUSD)+' G/$)</div>'
  + '</div>'
  + (trancheRows ? ('<div style="margin-top:14px;font-size:12px;"><strong style="font-family:Oswald,sans-serif;text-transform:uppercase;font-size:12px;">'+t('pv_echeansye')+'</strong>'+trancheRows+'</div>') : '')
  + '<div style="margin-top:16px;font-size:10px;color:#555;border-top:1px solid #ddd;padding-top:10px;"><strong>'+t('pv_kondisyon')+':</strong> '+esc(company.kondisyon||DEFAULT_TERMS)+'</div>'
  + '<div style="margin-top:40px;display:flex;justify-content:space-between;font-size:11px;">'
    + '<div>'+(company.siyati?('<img src="'+company.siyati+'" style="height:44px;display:block;margin-bottom:4px;">'):'<div style="height:44px;"></div>')+t('pv_siyatiKontrakte')+'<div style="margin-top:'+(company.siyati?'2':'36')+'px;border-top:1px solid #999;width:180px;"></div></div>'
    + '<div><div style="height:44px;"></div>'+t('pv_siyatiKliyan')+'<div style="margin-top:36px;border-top:1px solid #999;width:180px;"></div></div>'
  + '</div>'
  + qrVerificationBlock(p, company)
  + '</div>';
}
function qrVerificationBlock(p, company){
  var verifText = (p.devisNo||'')+' | '+(company.non||'')+' | '+(p.kliyan||'')+' | '+p.dat;
  var qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=90x90&data='+encodeURIComponent(verifText);

  + '</div>';
}
